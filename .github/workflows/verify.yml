name: verify

on:
  workflow_dispatch:

jobs:
  commit-stage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - repo: greeter-multi-repo-backend
            workflow: commit-stage-backend.yml
          - repo: greeter-multi-repo-frontend
            workflow: commit-stage-frontend.yml
    steps:
      - name: Trigger ${{ matrix.repo }} Commit Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "${{ matrix.workflow }}" \
            --repo "${{ github.repository_owner }}/${{ matrix.repo }}" \
            --ref main

      - name: Wait for ${{ matrix.repo }} Commit Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository_owner }}/${{ matrix.repo }}"
          workflow="${{ matrix.workflow }}"

          # Wait for the run to appear
          sleep 5

          # Get the latest run triggered by workflow_dispatch
          run_id=$(gh run list \
            --repo "$repo" \
            --workflow "$workflow" \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "Waiting for run $run_id in $repo..."
          gh run watch "$run_id" --repo "$repo" --exit-status

  acceptance-stage:
    needs: commit-stage
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Acceptance Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run acceptance-stage.yml \
            --repo "${{ github.repository }}" \
            --ref main

      - name: Wait for Acceptance Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          workflow="acceptance-stage.yml"

          # Wait for the run to appear
          sleep 5

          run_id=$(gh run list \
            --repo "$repo" \
            --workflow "$workflow" \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "$repo" --exit-status
